[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:django]
command=gunicorn trading_system.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120 --access-logfile /app/logs/gunicorn_access.log --error-logfile /app/logs/gunicorn_error.log
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stderr_logfile=/app/logs/django_err.log
stdout_logfile=/app/logs/django_out.log
environment=DJANGO_SETTINGS_MODULE="trading_system.settings",PYTHONPATH="/app"

[program:celery-worker]
command=celery -A trading_system worker -l info --logfile=/app/logs/celery_worker.log
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stderr_logfile=/app/logs/celery_worker_err.log
stdout_logfile=/app/logs/celery_worker_out.log
environment=DJANGO_SETTINGS_MODULE="trading_system.settings"

[program:celery-beat]
command=celery -A trading_system beat -l info --logfile=/app/logs/celery_beat.log
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stderr_logfile=/app/logs/celery_beat_err.log
stdout_logfile=/app/logs/celery_beat_out.log
environment=DJANGO_SETTINGS_MODULE="trading_system.settings"

[group:trading]
programs=django,celery-worker,celery-beat
