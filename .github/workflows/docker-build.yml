name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  IMAGE_NAME: trading-system
  DOCKER_REGISTRY: ghcr.io/hc1609

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # branch名称
          type=ref,event=branch
          # 语义化版本tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          # git sha
          type=sha,format=long
          # latest (仅master/main分支)
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        build-args: |
          VERSION=${{ github.ref_name }}


  deploy-notification:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - name: Notify deployment success
      run: |
        echo "✅ Docker镜像构建成功并已推送!"
        echo "镜像地址:"
        echo "- GitHub Container Registry: ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
        if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
          echo "- Docker Hub: ${{ secrets.DOCKERHUB_USERNAME }}/trading-system:${{ github.ref_name }}"
        fi
        echo ""
        echo "使用方法:"
        echo "  docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
        echo "  docker-compose up -d"
